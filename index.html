    <style>
        /* RESET & BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0A1F33 0%, #1C3F5F 100%);
            color: #E6F0FA;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* HEADER STYLES */
        .main-header {
            text-align: center;
            padding: 50px 0 40px;
            border-bottom: 3px solid #0F5FA8;
            margin-bottom: 40px;
            position: relative;
        }

        .main-header::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            height: 3px;
            background: #00CFFF;
        }

        .site-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: 6px;
            margin-bottom: 15px;
        }

        .primary-blue {
            color: #0F5FA8;
        }

        .glow-cyan {
            color: #00CFFF;
        }

        .site-tagline {
            font-size: 1.3rem;
            color: #1E88E5;
            letter-spacing: 3px;
            font-weight: 300;
        }

        /* STATS BAR */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin: 30px 0;
            padding: 20px 40px;
            background: rgba(15, 95, 168, 0.2);
            border-radius: 50px;
            border: 2px solid #0F5FA8;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            color: #00CFFF;
            font-weight: 700;
        }

        .stat-label {
            color: #E6F0FA;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* CATEGORIES GRID */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            padding: 20px 0;
            position: relative;
            z-index: 1;
        }

        /* CATEGORY CARD - Floating Panel (Option C) */
        .category-card {
            background: linear-gradient(135deg, rgba(15, 95, 168, 0.15), rgba(30, 136, 229, 0.1));
            border: 2px solid #0F5FA8;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            /* CRITICAL: Each card creates its own stacking context */
            isolation: isolate;
        }

        .category-card:hover {
            transform: translateY(-8px);
            border-color: #1E88E5;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            /* CRITICAL: Ensure hovered card has higher z-index */
            z-index: 10;
        }

        /* CATEGORY HEADER - Full-width gradient (Option A) */
        .category-header {
            background: linear-gradient(90deg, #0F5FA8, #1E88E5, #00CFFF);
            margin: -2px -2px 20px -2px;
            padding: 25px 25px 20px 25px;
            border-radius: 18px 18px 0 0;
            position: relative;
            border-bottom: 3px solid #0F5FA8;
        }

        .category-header h3 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            color: #E6F0FA;
            margin: 0;
            letter-spacing: 1px;
        }

        .category-header .category-icon {
            font-size: 2.2rem;
            margin-right: 15px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .category-description {
            color: #E6F0FA;
            font-size: 0.95rem;
            margin: 15px 0;
            line-height: 1.6;
            opacity: 0.9;
            padding: 0 5px;
        }

        .category-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 12px 15px;
            background: rgba(15, 95, 168, 0.25);
            border-radius: 12px;
            border: 1px solid #1E88E5;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #E6F0FA;
            font-size: 0.95rem;
        }

        .stat-value {
            color: #00CFFF;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }

        /* DROPDOWN STYLES - FIXED Z-INDEX ISSUE */
        .category-dropdown {
            position: relative;
            width: 100%;
            /* CRITICAL: This ensures dropdown content positions relative to card */
            z-index: 100;
        }

        .dropdown-btn {
            background: transparent;
            border: 2px solid #0F5FA8;
            color: #E6F0FA;
            padding: 14px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 5;
        }

        .dropdown-btn:hover {
            background: #0F5FA8;
            border-color: #1E88E5;
        }

        .dropdown-btn::after {
            content: '▼';
            font-size: 0.8rem;
            color: #00CFFF;
            transition: transform 0.3s ease;
        }

        .dropdown-btn.active::after {
            transform: rotate(180deg);
        }

        /* CRITICAL FIX: Dropdown content appears ABOVE everything */
        .dropdown-content {
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            width: 100%;
            background: #0A1F33;
            border: 2px solid #1E88E5;
            border-radius: 12px;
            padding: 12px 0;
            /* CRITICAL: Very high z-index to appear above other cards */
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            /* CRITICAL: Ensure dropdown doesn't get clipped */
            overflow: visible;
        }

        .dropdown-content.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
            pointer-events: all;
        }

        /* TOOL ITEMS IN DROPDOWN */
        .tool-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #E6F0FA;
            border-left: 4px solid transparent;
            position: relative;
            z-index: 1001;
        }

        .tool-item:hover {

            font-size: 0.7rem;

            border: 1px solid #1E88E5;

            padding: 40px 0;
            text-align: center;
            border-top: 3px solid #0F5FA8;
            position: relative;
            z-index: 1;
        }

        .main-footer::before {
            content: '';
            position: absolute;
            top: -3px;
            left: 50%;

            height: 3px;

            border: 2px solid #1E88E5;
            border-radius: 8px;
            color: #E6F0FA;

            z-index: 9999;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .notification.show {
            transform: translateX(0);
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 12px;
        }

            background: #0A1F33;
        }

            background: #0F5FA8;
            border-radius: 6px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #1E88E5;
        }
    </style>

                        <!-- Dropdown with tools -->
                        <div class="category-dropdown">
                            <button class="dropdown-btn" data-category="${cat.id}">
                                VIEW ${totalTools} TOOLS
                            </button>
                            <div class="dropdown-content" id="dropdown-${cat.id}">
                                ${cat.tools.map(tool => `
                                    <div class="tool-item" data-tool="${tool.page.replace('.html', '')}">
                                        <span class="tool-icon">${tool.icon}</span>
                                        <span class="tool-name">${tool.name}</span>
                                        <span class="tool-badge">${getPopularityBadge(tool.name)}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // ========== DROPDOWN FUNCTIONALITY - FIXED Z-INDEX ISSUE ==========
            document.querySelectorAll('.category-card').forEach(card => {
                const dropdown = card.querySelector('.dropdown-content');
                const btn = card.querySelector('.dropdown-btn');
                
                // CRITICAL: When hovering over the card, show dropdown and increase card z-index
                card.addEventListener('mouseenter', () => {
                    dropdown.classList.add('show');
                    btn.classList.add('active');
                    // Boost z-index of this card to ensure dropdown appears above others
                    card.style.zIndex = '100';
                });
                
                // CRITICAL: When mouse leaves the card, check if it's going to dropdown
                card.addEventListener('mouseleave', (e) => {
                    // Check if the related target is the dropdown or inside it
                    const relatedTarget = e.relatedTarget;
                    if (dropdown.contains(relatedTarget)) {
                        // Mouse is going to dropdown, keep dropdown open
                        return;
                    }
                    
                    // Small delay to allow moving to dropdown
                    setTimeout(() => {
                        // If dropdown isn't being hovered, hide it
                        if (!dropdown.matches(':hover')) {
                            dropdown.classList.remove('show');
                            btn.classList.remove('active');
                            card.style.zIndex = ''; // Reset z-index
                        }
                    }, 100);
                });
                
                // Keep dropdown open when hovering over it
                dropdown.addEventListener('mouseenter', () => {
                    dropdown.classList.add('show');
                    card.style.zIndex = '100';
                });
                
                // Hide dropdown when mouse leaves it
                dropdown.addEventListener('mouseleave', () => {
                    dropdown.classList.remove('show');
                    btn.classList.remove('active');
                    card.style.zIndex = ''; // Reset z-index
                });
            });

            // ========== TOOL CLICK NAVIGATION ==========
            document.querySelectorAll('.tool-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const tool = item.dataset.tool;
                    if (tool) {
                        window.location.href = `pages/${tool}.html`;
                    }
                });
            });

            // Show success notification
            showNotification('✅ Kali Commander loaded with 64 tools');
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', loadCategories);
        
        // Make notification function globally available
        window.showNotification = showNotification;
    </script>
</body>
</html>
